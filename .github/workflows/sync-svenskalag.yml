name: Sync svenskalag.se

# Triggar de två edge-funktionerna sync-gunnilse-squad och sync-gunnilse-calendar.
# Funktionerna är konfigurerade verify_jwt=false → publika, ingen auth behövs.
# - Nattligt vid 03:00 UTC (~05:00 svensk tid)
# - Måndag 06:00 UTC (~08:00 svensk tid) extra inför veckans matchplan
# - Manuellt via "Run workflow"-knappen i Actions-fliken

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  SUPABASE_URL: https://fojviymdmhjlpyrpjexp.supabase.co

jobs:
  sync-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: POST sync-gunnilse-calendar
        run: |
          response=$(curl --silent --show-error --max-time 60 \
            -X POST "$SUPABASE_URL/functions/v1/sync-gunnilse-calendar" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Calendar sync response: $response"
          echo "$response" | grep -q '"ok":true' || { echo "::error::Calendar sync failed"; exit 1; }

  sync-squad:
    runs-on: ubuntu-latest
    steps:
      - name: POST sync-gunnilse-squad
        run: |
          response=$(curl --silent --show-error --max-time 60 \
            -X POST "$SUPABASE_URL/functions/v1/sync-gunnilse-squad" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Squad sync response: $response"
          # Squad-funktionen kanske inte är deployad än — varna men misslyckas inte
          if ! echo "$response" | grep -q '"ok":true'; then
            echo "::warning::Squad sync svarade inte ok=true. Är funktionen deployad? Svar: $response"
          fi
