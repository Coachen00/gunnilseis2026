name: Deploy Supabase

# Auto-deployar migrationer + edge functions när något under supabase/ ändras.
# Trigger: push till main som rör supabase/migrations/** eller supabase/functions/**.
# Kan också köras manuellt via "Run workflow".
#
# Kräver två repo-secrets:
#   - SUPABASE_ACCESS_TOKEN  (Personal access token från
#                             https://supabase.com/dashboard/account/tokens)
#   - SUPABASE_DB_PASSWORD   (Databaslösenordet från Project Settings → Database)

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch:

env:
  PROJECT_REF: fojviymdmhjlpyrpjexp

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN saknas — lägg till den under repo Settings → Secrets and variables → Actions"
            exit 1
          fi
          supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD saknas"
            exit 1
          fi
          supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy sync-gunnilse-squad
          supabase functions deploy sync-gunnilse-calendar

      - name: Trigger initial sync
        run: |
          curl --silent --show-error --max-time 60 \
            -X POST "https://${PROJECT_REF}.supabase.co/functions/v1/sync-gunnilse-calendar" \
            -H "Content-Type: application/json" -d '{}' | head -200
          echo
          curl --silent --show-error --max-time 60 \
            -X POST "https://${PROJECT_REF}.supabase.co/functions/v1/sync-gunnilse-squad" \
            -H "Content-Type: application/json" -d '{}' | head -200
